[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[[services]]
name = "mishloha-mcp-server"

[services.variables]
PORT = "8000"
PYTHONUNBUFFERED = "1"
REPOS_DIR = "/app/repos"